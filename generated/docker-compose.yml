# Generated by Fablo (Fabric-X mode)
# Source reference: fabric-x/samples/tokens/compose.yml
#
# Design note: In real Fabric-X, the committer-test-node is external
# infrastructure and FSC nodes join the fabric_test network. Fablo bundles
# everything into one compose for single-command deployment.
# SC_SIDECAR_* env vars derived from fabric-x-committer image interface.

networks:
  test:
    name: fabric_test

services:

  ca.org1.example.com:
    image: hyperledger/fabric-ca:1.5.12
    container_name: ca.org1.example.com
    restart: unless-stopped
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca.org1.example.com
      - FABRIC_CA_SERVER_TLS_ENABLED=true
    ports:
      - "7054:7054"
    networks:
      - test

  committer-test-node:
    image: ghcr.io/hyperledger/fabric-x-committer-test-node:0.1.7
    container_name: committer-test-node
    restart: unless-stopped
    environment:
      - SC_SIDECAR_ORDERER_IDENTITY_MSP_DIR=/root/config/crypto/peerOrganizations/org1.example.com/peers/SC.org1.example.com/msp
      - SC_SIDECAR_ORDERER_IDENTITY_MSP_ID=Org1MSP
      - SC_SIDECAR_ORDERER_CHANNEL_ID=arma
      - SC_SIDECAR_ORDERER_SIGNED_ENVELOPES=true
      - SC_QUERY_SERVICE_SERVER_ENDPOINT=:7001
      - SC_ORDERER_BLOCK_SIZE=1
      - SC_SIDECAR_LOGGING_LEVEL=DEBUG
      - SC_QUERY_SERVICE_LOGGING_LEVEL=DEBUG
      - SC_COORDINATOR_LOGGING_LEVEL=DEBUG
      - SC_ORDERER_LOGGING_LEVEL=DEBUG
      - SC_VC_LOGGING_LEVEL=DEBUG
      - SC_VERIFIER_LOGGING_LEVEL=INFO
    ports:
      - "4001:4001"
      - "7001:7001"
      - "7050:7050"
      - "5433:5433"
    volumes:
      - ./crypto:/root/config/crypto
      - ./crypto/sc-genesis-block.proto.bin:/root/config/sc-genesis-block.proto.bin
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "4001"]
      interval: 5s
      timeout: 1s
      retries: 5
      start_period: 10s
    networks:
      - test

  endorser1.org1.example.com:
    hostname: endorser1.example.com
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_TYPE: endorser
        PLATFORM: "${PLATFORM:-fabricx}"
    container_name: endorser1.org1.example.com
    extra_hosts:
      - "committer-sidecar:host-gateway"
      - "committer-queryservice:host-gateway"
      - "orderer.example.com:host-gateway"
    expose:
      - 9001
      - 9301
    ports:
      - "9300:9000/tcp"
    volumes:
      - ./${CONF_ROOT:-conf}/endorser1:/conf
      - ./${CONF_ROOT:-conf}/namespace/zkatdlognoghv1_pp.json:/namespace/zkatdlognoghv1_pp.json
    depends_on:
      committer-test-node:
        condition: service_healthy
    networks:
      - test

  endorser2.org2.example.com:
    hostname: endorser2.example.com
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_TYPE: endorser
        PLATFORM: "${PLATFORM:-fabricx}"
    container_name: endorser2.org2.example.com
    extra_hosts:
      - "committer-sidecar:host-gateway"
      - "committer-queryservice:host-gateway"
      - "orderer.example.com:host-gateway"
    expose:
      - 9001
      - 9401
    ports:
      - "9400:9000/tcp"
    volumes:
      - ./${CONF_ROOT:-conf}/endorser2:/conf
    depends_on:
      committer-test-node:
        condition: service_healthy
    networks:
      - test
