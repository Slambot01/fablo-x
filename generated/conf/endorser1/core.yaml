# FSC core.yaml for endorser1
# Source: fabric-x/samples/tokens/conf/endorser1/core.yaml

logging:
  spec: info
  format: '%{color}%{time:2006-01-02 15:04:05.000 MST} [%{module}] %{shortfunc} -> %{level:.4s} %{id:03x}%{color:reset} %{message}'

fsc:
  id: endorser1 # CORE_FSC_ID
  networkConfigPath: ""
  p2p:
    listenAddress: /ip4/0.0.0.0/tcp/9301 # CORE_P2P_LISTENADDRESS
    type: libp2p
    opts:
      routing:
        path: /conf/routing-config.yaml
  identity:
    cert:
      file: /conf/fsc/endorser1/signcerts/endorser1-cert.pem
    key:
      file: /conf/fsc/endorser1/keystore/priv_sk
  persistences:
    default:
      type: sqlite
      opts:
        dataSource: file:./data/fts.sqlite # CORE_FSC_PERSISTENCES_OPTS_DATASOURCE
        skipPragmas: false
        maxOpenConns: 10
  endpoint:
    resolvers:
      - name: issuer
        domain: org1.example.com
        identity:
          id: issuer
          path: /conf/fsc/issuer/signcerts/issuer-cert.pem
        addresses:
          Listen: issuer.example.com:9101
      - name: endorser1
        domain: org1.example.com
        identity:
          id: endorser1
          path: /conf/fsc/endorser1/signcerts/endorser1-cert.pem
        addresses:
          Listen: endorser1.example.com:9301
      - name: endorser2
        domain: org2.example.com
        identity:
          id: endorser2
          path: /conf/fsc/endorser2/signcerts/endorser2-cert.pem
        addresses:
          Listen: endorser2.example.com:9401
      - name: owner1
        domain: org1.example.com
        identity:
          id: owner1
          path: /conf/fsc/owner1/signcerts/owner1-cert.pem
        addresses:
          Listen: owner1.example.com:9501
      - name: owner2
        domain: org1.example.com
        identity:
          id: owner2
          path: /conf/fsc/owner2/signcerts/owner2-cert.pem
        addresses:
          Listen: owner2.example.com:9601

fabric:
  enabled: true
  default:
    driver: fabricx
    msps:
      - id: endorser
        mspType: bccsp
        mspID: Org1MSP
        path: /conf/fabric/endorser1
    tls:
      enabled: false
    peers:
      - address: committer-sidecar:4001
        usage:
    queryService:
      - address: committer-queryservice:7001
    channels:
      - name: arma
        default: true

token:
  enabled: true
  tms:
    mytms:
      network: default
      channel: arma
      namespace: token_namespace
      driver: zkatdlog
      services:
        network:
          fabric:
            fsc_endorsement:
              endorser: true
              id: endorser
              policy:
                type: all
              endorsers:
                - endorser1
      publicParameters:
        path: ../namespace/zkatdlognoghv1_pp.json
